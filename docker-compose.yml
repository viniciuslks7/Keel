services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: keel
      POSTGRES_PASSWORD: keel
      POSTGRES_DB: keel
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keel -d keel']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://keel:keel@db:5432/keel
      SUPPORTED_CURRENCIES: BRL,USD
      LOG_LEVEL: info
    ports:
      - '3000:3000'

volumes:
  pgdata:
